<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">

  <meta name="theme-color" content="#2563eb">
  <title>YojnaAI - All-India Multilingual</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <style>
    :root {
      --bg-main: #f8fafc;
      --bg-panel: rgba(255, 255, 255, 0.95);
      --panel-border: rgba(226, 232, 240, 0.8);
      --primary: #000080;
      --primary-hover: #000066;
      --primary-light: #e0e7ff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --warning: #d97706;
      --warning-bg: #fffbeb;
      --warning-border: #fde68a;
      --success: #059669;
      --success-bg: #ecfdf5;
      --success-border: #a7f3d0;
      --radius: 12px;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-image: linear-gradient(135deg, rgba(255,153,51,0.88) 0%, rgba(255,255,255,0.96) 50%, rgba(19,136,8,0.88) 100%), url('assets/indian_industries_bg.png');
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      color: var(--text-main);
      min-height: 100vh;
      line-height: 1.6;
    }

    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%); }
    .auth-box { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: var(--shadow-lg); width: 100%; max-width: 420px; text-align: center; }
    .auth-box h2 { font-size: 2rem; color: var(--text-main); margin-bottom: 0.5rem; font-weight: 700; }
    .auth-box h2 span { color: var(--primary); }
    .auth-input { width: 100%; padding: 0.9rem; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 1rem; font-size: 1rem; background: #f8fafc; }
    .auth-btn { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .auth-toggle { background: none; border: none; color: var(--text-muted); cursor: pointer; margin-top: 1.5rem; font-size: 0.95rem; }
    .auth-toggle span { color: var(--primary); font-weight: 600; }

    .dashboard-layout { padding: 3rem 1.5rem; }
    .user-header-pill { position: absolute; top: 1.5rem; left: 1.5rem; background: #e0e7ff; color: #4338ca; padding: 6px 16px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .logout-btn { background: none; border: none; color: #ef4444; font-size: 0.75rem; font-weight: bold; cursor: pointer; margin-left: 8px; }
    .container { max-width: 900px; margin: 0 auto; position: relative; }
    .card { background: var(--bg-panel); border: 1px solid var(--panel-border); border-radius: var(--radius); padding: 2rem; margin-bottom: 2rem; box-shadow: var(--shadow-sm); }
    .badge { display: inline-block; background: var(--primary-light); color: var(--primary); padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 1rem; }
    .textarea-wrapper { position: relative; width: 100%; }
    textarea { width: 100%; padding: 1rem; padding-right: 3.5rem; border-radius: 8px; border: 1px solid #cbd5e1; min-height: 120px; font-family: inherit; }
    .mic-button { position: absolute; bottom: 1rem; right: 1rem; border-radius: 50%; width: 44px; height: 44px; display: flex; border: 1px solid #cbd5e1; cursor: pointer; align-items: center; justify-content: center; background: #f1f5f9; }
    .mic-button.recording { background: #fef2f2; border-color: #ef4444; color: #ef4444; animation: pulse-red 1.5s infinite; }
    @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    .btn-primary { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .lang-selector { position: absolute; top: -1.75rem; right: 0; background: white; border: 1px solid #cbd5e1; border-radius: 8px; padding: 6px; }

    /* Alert Banner */
    .alert-banner { background: linear-gradient(135deg, #4338ca 0%, #1e1b4b 100%); color: white; padding: 1rem 1.5rem; border-radius: 12px; margin-bottom: 2rem; display: flex; align-items: center; gap: 1.5rem; position: relative; }
    
    @keyframes ring {
      0% { transform: rotate(0); }
      5% { transform: rotate(20deg); }
      10% { transform: rotate(-20deg); }
      15% { transform: rotate(15deg); }
      20% { transform: rotate(-15deg); }
      25% { transform: rotate(10deg); }
      30% { transform: rotate(-10deg); }
      35% { transform: rotate(0); }
      100% { transform: rotate(0); }
    }
    .alert-icon-ring { 
      background: rgba(255, 255, 255, 0.2); 
      width: 48px; 
      height: 48px; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      animation: ring 2.5s ease-in-out infinite;
      transform-origin: top center;
      font-size: 1.5rem;
    }

    @keyframes rainbow-glow {
      0% { background: #ff0000; box-shadow: 0 0 12px #ff0000; }
      14% { background: #ff7f00; box-shadow: 0 0 12px #ff7f00; }
      28% { background: #ffff00; box-shadow: 0 0 12px #ffff00; }
      42% { background: #00ff00; box-shadow: 0 0 12px #00ff00; }
      57% { background: #0000ff; box-shadow: 0 0 12px #0000ff; }
      71% { background: #4b0082; box-shadow: 0 0 12px #4b0082; }
      85% { background: #8b00ff; box-shadow: 0 0 12px #8b00ff; }
      100% { background: #ff0000; box-shadow: 0 0 12px #ff0000; }
    }
    .alert-badge { 
      color: white; 
      font-size: 0.7rem; 
      font-weight: 800; 
      padding: 3px 10px; 
      border-radius: 6px; 
      margin-bottom: 0.35rem; 
      display: inline-block; 
      animation: rainbow-glow 3s linear infinite;
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
      border: none;
    }
    .alert-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.25rem; }
    .alert-actions { display: flex; gap: 1rem; align-items: center; margin-top: 0.75rem; }
    .alert-cta { background: white; color: #4338ca; border: none; padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .alert-cta:hover { transform: scale(1.05); background: #f8fafc; }

    /* Results */
    .scheme-card { background: white; padding: 1.25rem; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
    .scheme-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.25rem; margin-top: 1rem; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .tag { background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 500; border: 1px solid #e2e8f0; }
    .logic-tag { background: #e0e7ff; color: #4338ca; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }

    /* Chatbot */
    .chatbot-fab { position: fixed; bottom: 2rem; right: 2rem; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; font-size: 1.8rem; border: none; cursor: pointer; z-index: 10000; box-shadow: var(--shadow-lg); transition: transform 0.2s; }
    .chatbot-fab:hover { transform: scale(1.1); }
    .chatbot-window { position: fixed; bottom: 6rem; right: 2rem; width: 350px; height: 480px; background: white; border-radius: 12px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; z-index: 10000; overflow: hidden; border: 1px solid var(--panel-border); }
    .chatbot-header { background: var(--primary); color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .chatbot-messages { flex: 1; overflow-y: auto; padding: 1rem; background: #f8fafc; display: flex; flex-direction: column; gap: 0.75rem; }
    .chat-msg { max-width: 85%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.9rem; }
    .chat-msg.bot { background: #e2e8f0; align-self: flex-start; border-bottom-left-radius: 0; }
    .chat-msg.user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 0; }
    .chatbot-input { display: flex; padding: 0.75rem; border-top: 1px solid #e2e8f0; }
    .chatbot-input input { flex: 1; padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid #cbd5e1; margin-right: 0.5rem; outline: none; }
    .chatbot-input button { background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); }
    .modal-content { background: white; width: 90%; max-width: 700px; padding: 2rem; border-radius: 16px; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
    .modal-close { position: absolute; top: 1rem; right: 1rem; border: none; background: #f1f5f9; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }

    .spinner-container { display: flex; justify-content: center; margin: 2rem 0; }
    .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

      const [showSettings, setShowSettings] = useState(false);
      const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
      const [messages, setMessages] = useState([{ sender: 'bot', text: t?.botGreeting || 'Namaste! How can I help you today?' }]);
      const [input, setInput] = useState('');
      const endRef = useRef(null);

      useEffect(() => {
        if (messages.length <= 1) {
            setMessages([{ sender: 'bot', text: t?.botGreeting || 'Namaste! How can I help you today?' }]);
        }
      }, [language, t]);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

      const saveKey = () => {
        localStorage.setItem('gemini_api_key', apiKey.trim());
        setShowSettings(false);
      };

      const handleSend = async () => {
        if (!input.trim()) return;
        const msg = input.trim();
        setMessages(prev => [...prev, { sender: 'user', text: msg }]);
        setInput('');
        setMessages(prev => [...prev, { sender: 'bot', text: 'Thinking...', isTyping: true }]);

        try {
          const response = await fetch('http://localhost:5001/api/chat', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'X-Gemini-Key': localStorage.getItem('gemini_api_key') || ''
            },
            body: JSON.stringify({ message: msg })
          });
          
          if (!response.ok) throw new Error("Network Response Error");
          const data = await response.json();
          
          setMessages(prev => {
            const noTyping = prev.filter(m => !m.isTyping);
            return [...noTyping, { sender: 'bot', text: data.reply || "No response received." }];
          });
        } catch(e) {
          console.error("Chatbot Error:", e);
          setMessages(prev => {
            const noTyping = prev.filter(m => !m.isTyping);
            return [...noTyping, { sender: 'bot', text: "Error connecting to AI Server. Please ensure 'py run_server.py' is running and the internet is connected." }];
          });
        }
      };

      return (
        <>
          {isOpen && (
            <div className="chatbot-window" style={{ display: 'flex', flexDirection: 'column' }}>
              <div className="chatbot-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

                </div>
              </div>

              <div className="chatbot-messages" style={{ flexGrow: 1 }}>
                {messages.map((m, i) => <div key={i} className={`chat-msg ${m.sender}`}>{m.text}</div>)}
                <div ref={endRef} />
              </div>
              <div className="chatbot-input">
                <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSend()} placeholder="Ask about policies..." />
                <button onClick={handleSend}>Send</button>
              </div>
            </div>
          )}

        </>
      );

                              <p style={{fontSize: '0.85rem', fontStyle: 'italic', marginTop: '10px', color: '#334155', borderLeft: '3px solid #cbd5e1', paddingLeft: '10px'}}>"{c.centralSource.text}"</p>
                            </div>
                            <div style={{background: '#f8fafc', padding: '16px', borderRadius: '8px', border: '1px solid #e2e8f0'}}>
                              <div style={{color: '#0f172a', fontWeight: 'bold', marginBottom: '5px'}}>📍 State Policy Clause:</div>
                              <div style={{fontSize: '0.85rem', color: '#475569'}}>{c.stateSource.pdf} <br/> {c.stateSource.clause} ({c.stateSource.page})</div>
                              <p style={{fontSize: '0.85rem', fontStyle: 'italic', marginTop: '10px', color: '#334155', borderLeft: '3px solid #cbd5e1', paddingLeft: '10px'}}>"{c.stateSource.text}"</p>
                            </div>
                          </div>
                          
                          <div style={{background: '#fcf8ff', padding: '16px', borderRadius: '8px', border: '1px solid #c7d2fe', marginBottom: '20px'}}>
                            <strong style={{color: '#3730a3', display:'block', marginBottom:'5px'}}>💡 Resolution Strategy (How to Avail Benefits):</strong> 
                            <span style={{fontSize: '0.95rem', color: '#312e81', lineHeight: '1.6'}}>{c.detail}</span>
                          </div>
                          
                          <div style={{textAlign: 'right'}}>
                            <button onClick={() => setSelectedScheme(schemeToOpen)} style={{background: '#e11d48', color: 'white', padding: '10px 24px', borderRadius: '8px', border: 'none', cursor: 'pointer', fontWeight: 'bold', fontSize:'0.9rem', transition:'background 0.2s'}}>
                              Click for More Details (Docs & Links) ↗
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {results.top5 && results.top5.length > 0 && (
                  <div className="card" style={{borderColor: 'var(--primary)', background: '#f8fafc', marginBottom: '2rem'}}>
                    <h3 style={{color: 'var(--primary)', display:'flex', alignItems:'center', gap:'8px'}}>
                      <span style={{fontSize:'1.4rem'}}>⭐</span> Top 5 Recommended Policies
                    </h3>
                    <p style={{fontSize:'0.9rem', color:'#64748b', marginBottom:'1.5rem'}}>
                      AI-ranked based on Eligibility Match (40%), Need Relevance (30%), Benefit Value (20%), and Priority (10%). Diversity constraint applied.
                    </p>
                    <div className="grid-2">
                      {results.top5.map((s, i) => (
                        <div key={i} className="scheme-card" onClick={() => setSelectedScheme(s)} style={{border:'2px solid #e0e7ff', background:'white'}}>
                          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                            <h4 style={{color:'#1e3a8a'}}>{i+1}. {s.title}</h4>
                            <span style={{background:'#dbeafe', color:'#1e40af', padding:'4px 8px', borderRadius:'12px', fontSize:'0.75rem', fontWeight:'bold'}}>Score: {s.ai_score}</span>
                          </div>
                          <p style={{margin:'8px 0', fontSize:'0.9rem'}}><strong>Why Relevant:</strong> {s.ai_why_relevant}</p>
                          <p style={{fontSize:'0.85rem', color:'#475569'}}>{s.summary}</p>
                          <div className="tag-row"><span className="logic-tag">{s.category}</span><span className="logic-tag">📅 {s.deadline}</span></div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <div className="card">
                  <h3>{t.matchesTitle}</h3>
                  <div className="grid-2">
                    {results.schemes.map((s, i) => (
                      <div key={i} className="scheme-card" onClick={() => setSelectedScheme(s)}>
                        <h4>{s.title}</h4>
                        <p>{s.summary}</p>
                        {s.ministry && (
                          <div style={{fontSize:'0.78rem', color:'#475569', marginTop:'8px', padding:'8px', background:'#f1f5f9', borderRadius:'6px'}}>
                            <div>🏛️ {s.ministry}</div>
                            <div>📞 <a href={'tel:' + s.helpline} style={{color:'#2563eb', textDecoration:'none'}}>{s.helpline}</a> &nbsp;|&nbsp; 📧 <a href={'mailto:' + s.email} style={{color:'#2563eb', textDecoration:'none'}}>{s.email}</a></div>
                          </div>
                        )}
                        <div className="tag-row"><span className="logic-tag">{s.category}</span><span className="logic-tag">📅 {s.deadline}</span></div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>

          {selectedScheme && (
            <div className="modal-overlay" onClick={() => setSelectedScheme(null)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <button className="modal-close" onClick={() => setSelectedScheme(null)}>✕</button>
                <div style={{borderBottom:'2px solid #e2e8f0', paddingBottom:'10px', marginBottom:'15px'}}>
                  <h2 style={{color: '#000080', fontSize:'1.7rem'}}>{selectedScheme.title} <span style={{fontSize:'0.9rem', color:'#64748b', fontWeight:'500'}}>({selectedScheme.docId})</span></h2>
                </div>
                
                <div style={{background:'#f8fafc', padding:'15px', borderRadius:'8px', borderLeft:'4px solid #000080', marginBottom:'20px'}}>
                  <h4 style={{marginBottom:'10px', color:'#0f172a'}}>Strict Eligibility Matches</h4>
                  <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', fontSize:'0.9rem'}}>
                    <div><strong>📄 RAG Source:</strong> {selectedScheme.pdfSource}</div>
                    <div><strong>⚖️ Legal Clause:</strong> {selectedScheme.clauseRef}</div>
                    <div><strong>📑 Page No:</strong> {selectedScheme.pageRef}</div>
                    <div><strong>🎯 Category/Field:</strong> {(selectedScheme.category || "General").toUpperCase()}</div>
                    {selectedScheme.matchRules?.maxAcres && <div><strong>🌾 Acreage Limit:</strong> {selectedScheme.matchRules.maxAcres} Hectares/Acres</div>}
                    <div style={{gridColumn:'1 / -1'}}><strong>⏳ Date & Expiry:</strong> <span style={{color:'#dc2626', fontWeight:'600'}}>{selectedScheme.deadline}</span></div>
                  </div>
                </div>

                <div style={{marginBottom:'20px'}}>
                  <h4 style={{marginBottom:'5px'}}>Short Explanation:</h4>
                  <p style={{fontSize:'0.95rem', color:'#334155'}}>{selectedScheme.summary}</p>
                  {selectedScheme.extractedText && (
                    <blockquote style={{background:'#e0e7ff', padding:'10px', borderRadius:'6px', fontStyle:'italic', fontSize:'0.85rem', marginTop:'10px', borderLeft:'3px solid #4338ca'}}>
                      "{selectedScheme.extractedText}"
                    </blockquote>
                  )}
                </div>

                <div style={{marginBottom:'20px'}}>
                  <h4 style={{marginBottom:'5px'}}>Documents Required:</h4>
                  <ul style={{marginLeft:'20px', fontSize:'0.9rem', color:'#334155'}}>
                    {(selectedScheme.documents||[]).map((d,i)=><li key={i}>{d}</li>)}
                  </ul>
                </div>

                {selectedScheme.ministry && (
                  <div style={{background:'#eff6ff', padding:'15px', borderRadius:'8px', borderLeft:'4px solid #2563eb', marginBottom:'20px'}}>
                    <h4 style={{marginBottom:'10px', color:'#1e40af'}}>📞 Ministry Helpline & Contact</h4>
                    <div style={{display:'grid', gridTemplateColumns:'1fr', gap:'8px', fontSize:'0.9rem'}}>
                      <div><strong>🏛️ Ministry:</strong> {selectedScheme.ministry}</div>
                      <div><strong>📞 Helpline:</strong> <a href={'tel:' + selectedScheme.helpline} style={{color:'#2563eb'}}>{selectedScheme.helpline}</a> (Toll-Free)</div>
                      <div><strong>📧 Email:</strong> <a href={'mailto:' + selectedScheme.email} style={{color:'#2563eb'}}>{selectedScheme.email}</a></div>
                    </div>
                  </div>
                )}

                <div style={{textAlign:'center', marginTop:'1rem'}}>
                  <a href={selectedScheme.url} target="_blank" rel="noopener noreferrer" 
                     style={{display:'inline-block', background:'#000080', color:'white', padding:'12px 24px', borderRadius:'8px', textDecoration:'none', fontWeight:'bold', fontSize:'1rem', transition:'0.2s', width:'100%'}}>
                    Click for more details
                  </a>
                </div>
              </div>
            </div>
          )}
          <Chatbot schemes={initialSchemes} language={language} t={t} />
        </div>
      );
    };

    const AuthScreen = ({ onAuthSuccess }) => {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleAuth = (e) => {
        e.preventDefault();
        if (email === 'xyz@abc.com' && password === '123') {
          const user = { id: '9872141569', identifier: email, isNew: false };
          localStorage.setItem('yojnaai_sess', JSON.stringify(user));
          onAuthSuccess(user);
        } else if (!isLogin) {
          const user = { id: Math.floor(1e9+Math.random()*9e8).toString(), identifier: email, isNew: true };
          localStorage.setItem('yojnaai_sess', JSON.stringify(user));
          onAuthSuccess(user);
        } else {
          setError('Invalid credentials (Try xyz@abc.com / 123)');
        }
      };

      return (
        <div className="auth-container">
          <div className="auth-box">
            <h2>Yojna<span>AI</span></h2>
            <p>One Nation. One Dashboard.</p>
            {error && <div style={{color:'red', marginBottom:'1rem'}}>{error}</div>}
            <form onSubmit={handleAuth}>
              <input className="auth-input" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required />
              <input className="auth-input" type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} required />
              <button className="auth-btn" type="submit">{isLogin ? 'Sign In' : 'Create Account'}</button>
            </form>
            <button className="auth-toggle" onClick={()=>setIsLogin(!isLogin)}>{isLogin ? 'Don\'t have an account? Sign Up' : 'Already have an account? Sign In'}</button>
          </div>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [schemes, setSchemes] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const saved = localStorage.getItem('yojnaai_sess');
        if (saved) setUser(JSON.parse(saved));
        fetch('http://localhost:5001/api/schemes').then(r=>r.json()).then(d=>setSchemes(d.schemes)).finally(()=>setLoading(false));
      }, []);

      if (loading) return <div className="spinner-container"><div className="spinner" /></div>;
      return user ? <Dashboard user={user} onLogout={()=>{localStorage.removeItem('yojnaai_sess'); setUser(null);}} initialSchemes={schemes} /> : <AuthScreen onAuthSuccess={setUser} />;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
